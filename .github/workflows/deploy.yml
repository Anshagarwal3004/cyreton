name: Deploy Cyreton Site

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy to HostingN
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        protocol: ftps
        port: 990
        security: loose  # This helps with self-signed certificates on shared hostin

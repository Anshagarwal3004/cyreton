name: Secure SSH Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to HostingN
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_SERVER }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 22  # Changed from SSH_PORT to the correct variable name
          TARGET: "/home/cyretoni/public_html"
          SOURCE: "./"
          ARGS: "-avzr --delete"
          EXCLUDE: "/.github/, /.git/"
